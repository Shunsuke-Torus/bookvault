services:
  app:
    build: .
    container_name: bookvault-app
    ports:
      - "3000:3000"
    volumes:
      - bookvault-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/app/data/bookvault.db
    restart: unless-stopped

volumes:
  bookvault-data:
    driver: local
